model_name: microsoft/codebert-base
max_length: 512

# Training defaults (override via CLI or task config)
learning_rate: 2.0e-5
per_device_train_batch_size: 16
per_device_eval_batch_size: 32
num_train_epochs: 5
weight_decay: 0.01
warmup_ratio: 0.1
gradient_accumulation_steps: 1
fp16: true
seed: 42

# Memory optimisation — LoRA + quantization + gradient checkpointing
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
quantize_4bit: true
gradient_checkpointing: true
