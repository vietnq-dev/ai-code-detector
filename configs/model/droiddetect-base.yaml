model_name: project-droid/DroidDetect-Base
num_labels: 2
max_length: 256

# Training defaults (binary task)
learning_rate: 2.0e-5
per_device_train_batch_size: 32
per_device_eval_batch_size: 256
num_train_epochs: 1
weight_decay: 0.01
warmup_ratio: 0.1
gradient_accumulation_steps: 1
fp16: true
seed: 42

# DroidDetect TL model already adds projection head and contrastive term
use_lora: false
quantize_4bit: false
gradient_checkpointing: false
